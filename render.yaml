databases:
  - name: okx-predictions-db
    plan: free
    databaseName: predictx
    user: predictx

services:
  - type: web
    name: okx-predictions-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: okx-predictions-db
          property: connectionString
      - key: CONTRACT_ADDRESS
        value: "0x0169a7068B81DB0a1D14ecF12d5Abe26a10fB968"
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: PORT
        value: "3001"
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: okx-predictions-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npx vite build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
